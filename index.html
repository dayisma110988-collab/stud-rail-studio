<script>
// Show compile progress
document.getElementById('load-msg').textContent = 'Compiling app (first load only)...';

// Compile and run the JSX
setTimeout(function() {
  try {
    var code = document.getElementById('app-source').textContent;
    var compiled = Babel.transform(code, {
      presets: ['react'],
      filename: 'app.jsx'
    }).code;
    
    document.getElementById('load-msg').textContent = 'Starting...';
    
    // Execute compiled code
    // Execute compiled code and expose App globally
    eval(compiled);
    
    // Mount React app  
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(window.App || App));
    
    // Hide loading
    document.getElementById('loading').style.display = 'none';
    
  } catch(err) {
    document.getElementById('load-msg').textContent = 'Error: ' + err.message;
    console.error(err);
  }
}, 100);
</script>

// --- Claude AI ---
async function callAI(content, system) {
  const body = { model:"claude-sonnet-4-6", max_tokens:1000, messages:[{role:"user",content}] };
  if(system) body.system = system;
  const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data = await r.json();
  return (data.content||[]).map(c=>c.text||"").join("");
}

      doc.text(String(item.qty),90,ry+15,{align:"center"});

      doc.setDrawColor(209,213,219); doc.rect(36,ry,540,38,"S");
      ry+=38;
    });
    for(let i=0;i<9-items.length;i++){
      const bg=(items.length+i)%2===0?[255,255,255]:[243,244,246];
      doc.setFillColor(...bg); doc.rect(36,ry,540,22,"F");

    doc.text("$ "+inv.toFixed(2),570,ty,{align:"right"});
    doc.setFont("helvetica","normal"); doc.setTextColor(107,114,128);
    doc.text("SALES TAX",435,ty+16,{align:"right"});
    doc.setTextColor(0,0,0); doc.text("0.00",570,ty+16,{align:"right"});
    doc.setDrawColor(233,30,140); doc.setLineWidth(0.8);
    doc.line(390,ty+22,576,ty+22);
    doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(0,0,0);
    doc.text("TOTAL",435,ty+36,{align:"right"});
    doc.text(inv.toFixed(2),570,ty+36,{align:"right"});

    // Footer
    doc.setFillColor(26,26,46); doc.rect(36,700,540,26,"F");
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(8.5);
    doc.text("Make all checks payable to MAYRA D. SILVA ALBORNOZ",306,717,{align:"center"});
    doc.setTextColor(233,30,140); doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text("THANK YOU FOR YOUR BUSINESS!",36,742);

    const fname = invNo.replace(/[^A-Z0-9-]/gi,"_")+"_"+p.name.replace(/[^A-Z0-9]/gi,"_").slice(0,20)+".pdf";
    doc.save(fname);
  };

  if(window.jspdf) { gen(); }
  else {
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload=gen; document.head.appendChild(s);
  }
}

// --- reducer ---
function reducer(state,action){
  switch(action.type){
    case "ADD_PROJECT":    return {...state, projects:[action.p,...state.projects]};
    case "UPD_PROJECT":    return {...state, projects:state.projects.map(p=>p.id===action.p.id?action.p:p)};
    case "UPD_DRAFTER":   return {...state, drafters:state.drafters.map(d=>d.id===action.d.id?action.d:d)};
    case "ADD_NOTIF":     return {...state, notifs:[action.n,...state.notifs].slice(0,30)};
    case "READ_NOTIFS":   return {...state, notifs:state.notifs.map(n=>({...n,read:true}))};
    case "CLEAR_NOTIFS":  return {...state, notifs:[]};
    default: return state;
  }
}

// ========== DASHBOARD ==========
function Dash({projects,drafters,onOpen,onProg}) {
  const active = projects.filter(p=>p.status==="in_progress").length;
  const due3   = projects.filter(p=>{const d=daysUntil(p.dueDate);return d!==null&&d>=0&&d<=3&&p.status!=="submitted";});
  const over   = projects.filter(p=>{const d=daysUntil(p.dueDate);return d!==null&&d<0&&p.status!=="submitted";});
  return (
    <div>
      <h2 style={{margin:"0 0 14px",fontSize:19,fontWeight:800}}>Dashboard</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:11,marginBottom:18}}>
        {[["Projects",projects.length,"#6366F1","#EEF2FF"],["Active",active,"#3B82F6","#DBEAFE"],["Due Soon",due3.length,"#F59E0B","#FEF3C7"],["Overdue",over.length,"#EF4444","#FEE2E2"]].map(([l,v,c,bg])=>(
          <div key={l} style={{background:bg,borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:22,fontWeight:900,color:c}}>{v}</div>
            <div style={{fontSize:10,color:"#6B7280",fontWeight:600,marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:11}}>
        {projects.map(p=>{
          const drs=(p.assignedTo||[]).map(id=>drafters.find(d=>d.id===id)).filter(Boolean);
          const sm=SM[p.status]||SM.pending;
          const du=daysUntil(p.dueDate);
          const urg=du!==null&&du<=2&&p.status!=="submitted";
          return (
            <div key={p.id} style={{background:"#fff",borderRadius:11,padding:14,border:"2px solid "+(urg?"#FCA5A5":"#E5E7EB"),cursor:"pointer"}} onClick={()=>onOpen(p)} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(99,102,241,.14)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <div>
                  {urg&&<div style={{fontSize:8,color:"#DC2626",fontWeight:800,background:"#FEE2E2",display:"inline-block",borderRadius:4,padding:"1px 5px",marginBottom:2}}>DUE IN {du}D</div>}
                  <div style={{fontSize:9,color:"#6366F1",fontWeight:700}}>{p.id} - {p.client}</div>
                  <div style={{fontWeight:700,fontSize:13,marginTop:1}}>{p.name}</div>
                </div>
                <Chip label={sm.lb} bg={sm.bg} tx={sm.tx}/>
              </div>
              <div style={{fontSize:9,color:"#6B7280",marginBottom:8,display:"flex",gap:10}}>
                <span>{p.totalDrawings} dwgs</span>
                <span>Due {fmtDate(p.dueDate)}</span>
                <span>Est {fmtDate(p.estimatedSubmit)}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#6B7280",marginBottom:2}}>
                    <span>{drs.map(d=>d.name).join("+")}</span>
                    <span style={{fontWeight:700,color:"#6366F1"}}>{p.progressPct||0}%</span>

function Tracker({projects,onUpdate,onNotif}) {

                <td style={{padding:"8px 10px",color:"#7C3AED",fontWeight:600,whiteSpace:"nowrap"}}>{fmtDate(p.estimatedSubmit)}</td>
                <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}><span style={{color:urg?"#DC2626":"#374151",fontWeight:urg?700:400}}>{urg?"URGENT: ":""}{fmtDate(p.dueDate)}{du!==null&&p.status!=="submitted"?" ("+du+"d)":""}</span></td>

              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ========== EMAIL HUB ==========
function EmailHub({projects,drafters,onOpen}) {
  const [selP,setSP]=useState(projects[0]?.id||"");
  const [selT,setST]=useState("ack");
  const types=[{k:"ack",lb:"Acknowledge Client"},{k:"update",lb:"Status to Client"},{k:"delivery",lb:"Deliver to Client"},{k:"assign",lb:"Assign Drafter"},{k:"status",lb:"Check Drafter"}];
  const getEmail=()=>{
    const p=projects.find(x=>x.id===selP);if(!p)return null;
    const dr=drafters.find(d=>(p.assignedTo||[]).includes(d.id));
    if(selT==="ack"||selT==="update"||selT==="delivery") return mkClientEmail(p,selT);
    if(dr&&(selT==="assign"||selT==="status")) return mkDrafterEmail(p,dr,selT);
    return null;
  };
  const em=getEmail();
  return (
    <div>
      <h2 style={{margin:"0 0 4px",fontSize:19,fontWeight:800}}>Email Hub</h2>
      <div style={{fontSize:10,color:"#6B7280",marginBottom:12}}>
        Client: <strong style={{color:"#818CF8"}}>{EMAIL.client}</strong> to {EMAIL.fromClient} (CC: {EMAIL.cc1}, {EMAIL.cc2})<br/>
        Drafters: <strong style={{color:"#34D399"}}>{EMAIL.drafters}</strong> to each drafter Gmail
      </div>
      <div style={{background:"#fff",borderRadius:11,padding:13,border:"1px solid #E5E7EB",marginBottom:11}}>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
          {types.map(t=><button key={t.k} onClick={()=>setST(t.k)} style={{background:selT===t.k?"linear-gradient(135deg,#6366F1,#A855F7)":"#F3F4F6",color:selT===t.k?"#fff":"#374151",border:"none",borderRadius:6,padding:"6px 11px",cursor:"pointer",fontWeight:700,fontSize:10}}>{t.lb}</button>)}
        </div>
        <select value={selP} onChange={e=>setSP(e.target.value)} style={{width:"100%",border:"1px solid #E5E7EB",borderRadius:7,padding:"7px 9px",fontSize:11,outline:"none",background:"#F8F7F4"}}>
          {projects.map(p=><option key={p.id} value={p.id}>{p.id} - {p.name} ({p.client})</option>)}
        </select>
      </div>
      {em&&<div style={{background:"#fff",borderRadius:11,padding:13,border:"2px solid #C7D2FE"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:9}}>
          <div style={{fontSize:10,color:"#4F46E5",fontWeight:700}}>From: {em.from}</div>
          <button onClick={()=>onOpen(em)} style={{background:"linear-gradient(135deg,#6366F1,#A855F7)",color:"#fff",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontWeight:700,fontSize:10}}>Open and Send</button>
        </div>
        <div style={{fontSize:9,color:"#6B7280",marginBottom:2}}>To: {em.to}{em.cc?" | CC: "+em.cc:""}</div>
        <div style={{fontSize:9,color:"#6B7280",marginBottom:8}}>Subject: {em.subject}</div>
        <pre style={{fontFamily:"inherit",fontSize:10,color:"#374151",background:"#F8F7F4",borderRadius:7,padding:10,whiteSpace:"pre-wrap",margin:0,maxHeight:220,overflowY:"auto",lineHeight:1.6}}>{em.body}</pre>
      </div>}
    </div>
  );
}

// ========== INVOICES ==========
function InvPanel({projects,drafters,onUpdate,onEmail,onPDF}) {
  const [sel,setSel]=useState(null);
  if(sel) return <InvDetail project={sel} drafters={drafters} onBack={()=>setSel(null)} onUpdate={p=>{onUpdate(p);setSel(p);}} onEmail={onEmail} onPDF={onPDF}/>;
  const totalBilled=projects.reduce((s,p)=>s+calcInv(p),0);
  const totalSent=projects.filter(p=>p.invoiced).reduce((s,p)=>s+calcInv(p),0);
  const totalPay=projects.reduce((s,p)=>s+calcPay(p,drafters).reduce((a,h)=>a+h.pay,0),0);
  return (
    <div>
      <h2 style={{margin:"0 0 12px",fontSize:19,fontWeight:800}}>Invoices and Billing</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:9,marginBottom:14}}>
        {[["Total Billed","$"+totalBilled.toLocaleString(),"#6366F1","#EEF2FF"],["Sent","$"+totalSent.toLocaleString(),"#10B981","#D1FAE5"],["Pending","$"+(totalBilled-totalSent).toLocaleString(),"#F59E0B","#FEF3C7"],["Drafter Cost","$"+totalPay.toFixed(2),"#EC4899","#FCE7F3"]].map(([l,v,c,bg])=>(
          <div key={l} style={{background:bg,borderRadius:9,padding:"10px 12px"}}>
            <div style={{fontWeight:900,fontSize:17,color:c}}>{v}</div>
            <div style={{fontSize:9,color:"#6B7280",fontWeight:600,marginTop:1}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#F8F7FF",borderRadius:9,padding:"9px 12px",border:"1px solid #C7D2FE",marginBottom:13,fontSize:10}}>
        <strong style={{color:"#4F46E5"}}>Billing Rules: </strong>
        <span style={{color:"#374151"}}>New project = $150/stud rail floor | Revision (EOR) = $50/drafter hour | Our mistakes = $0</span><br/>
        <span style={{color:"#6B7280"}}>Pay rates: Joe $5/hr | Junell $5.50/hr | Jay $5/hr</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {projects.map((p,i)=>{
          const inv=calcInv(p);
          const pay=calcPay(p,drafters).reduce((s,h)=>s+h.pay,0);
          const hrs=(p.drafterHours||[]).reduce((s,h)=>s+Number(h.hours||0),0);
          return (
            <div key={p.id} onClick={()=>setSel(p)} style={{background:"#fff",borderRadius:10,padding:"11px 14px",border:"1px solid #E5E7EB",cursor:"pointer",display:"flex",alignItems:"center",gap:11}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 3px 12px rgba(99,102,241,.1)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
              <div style={{flex:"0 0 65px"}}>
                <div style={{fontSize:8,color:"#6B7280"}}>INV-{String(i+1).padStart(3,"0")}</div>
                <div style={{fontWeight:900,fontSize:15}}>${inv.toLocaleString()}</div>
                <div style={{fontSize:8,color:"#EC4899"}}>pay ${pay.toFixed(2)}</div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:11}}>{p.id} - {p.name}</div>
                <div style={{fontSize:9,color:"#6B7280"}}>{p.client} | {p.billingType==="revision"?"Revision":"New"} | {p.studRailFloors||p.totalDrawings} {p.billingType==="revision"?"hrs logged":"floors"}</div>
                <div style={{fontSize:8,color:"#6B7280",marginTop:1}}>Received: {p.receivedDate||"---"} | Submitted: {p.submittedDate||"pending"}</div>
              </div>
              <div style={{textAlign:"right",flex:"0 0 75px"}}>
                <div style={{fontSize:9,fontWeight:700,color:inv-pay>0?"#065F46":"#DC2626"}}>Margin: ${(inv-pay).toFixed(2)}</div>

              </div>
              <Chip label={p.invoiced?"SENT":"PENDING"} bg={p.invoiced?"#D1FAE5":"#FEF3C7"} tx={p.invoiced?"#065F46":"#92400E"}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

            <input type="date" value={newH.date} onChange={e=>setNH(n=>({...n,date:e.target.value}))} style={{border:"1px solid #E5E7EB",borderRadius:5,padding:"4px 6px",fontSize:10,outline:"none"}}/>
            <input placeholder="Description" value={newH.description} onChange={e=>setNH(n=>({...n,description:e.target.value}))} style={{border:"1px solid #E5E7EB",borderRadius:5,padding:"4px 6px",fontSize:10,outline:"none"}}/>
            <button onClick={addH} style={{background:"#6366F1",color:"#fff",border:"none",borderRadius:5,padding:"4px 9px",cursor:"pointer",fontWeight:700,fontSize:10}}>Add</button>

          <label style={{fontSize:9,color:"#374151",display:"flex",alignItems:"center",gap:4,marginTop:6,cursor:"pointer"}}>

        {(p.drafterHours||[]).length===0

          :<table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>

                  <td style={{padding:"5px 6px",fontWeight:700,color:"#EC4899"}}>${h.pay.toFixed(2)}</td>
                  <td style={{padding:"5px 6px",color:"#374151"}}>{h.description}</td>
                  <td style={{padding:"5px 6px"}}><Chip label={h.billable?"BILLABLE":"NO CHARGE"} bg={h.billable?"#D1FAE5":"#F3F4F6"} tx={h.billable?"#065F46":"#6B7280"}/></td>
                  <td style={{padding:"5px 6px"}}><button onClick={()=>delH(h.id)} style={{background:"#FEE2E2",border:"none",borderRadius:4,padding:"2px 5px",cursor:"pointer",color:"#DC2626",fontSize:9}}>X</button></td>
                </tr>
              ))}
              <tr style={{borderTop:"2px solid #E5E7EB",background:"#F8F7F4"}}>
                <td colSpan={2} style={{padding:"5px 6px",fontWeight:800,fontSize:11}}>TOTAL</td>
                <td style={{padding:"5px 6px",fontWeight:800}}>{totalHrs}h</td>
                <td/>
                <td style={{padding:"5px 6px",fontWeight:800,color:"#EC4899"}}>${totalPay.toFixed(2)}</td>
                <td colSpan={3} style={{padding:"5px 6px",fontSize:9,color:"#6B7280"}}>Margin: <strong style={{color:"#065F46"}}>${(inv-totalPay).toFixed(2)}</strong></td>
              </tr>
            </tbody>
          </table>
        }
      </div>
    </div>
  );
}

// ========== SMART INBOX ==========
function SmartInbox({drafters,onClose,onCreate,onToast,onNotif}) {
  const [step,setStep]=useState("paste");
  const [body,setBody]=useState("");
  const [pdfs,setPDFs]=useState([]);
  const [loading,setLoading]=useState(false);
  const [parsed,setParsed]=useState(null);
  const [assignIds,setAssIds]=useState([]);
  const ref=useRef();
  const toB64=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});
  const analyze=async()=>{
    if(!body.trim()&&pdfs.length===0){onToast("Paste email or upload PDF","error");return;}
    setLoading(true);
    try{
      const blocks=[];
      for(const f of pdfs){const b64=await toB64(f);blocks.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}});}
      blocks.push({type:"text",text:"Extract stud rail project info. Return ONLY valid JSON:\n{\"projectId\":\"YYYYNNN\",\"projectName\":\"building name\",\"client\":\"company\",\"address\":\"full address\",\"type\":\"new or revision\",\"totalDrawings\":number,\"deadline\":\"deadline text\",\"dueDate\":\"YYYY-MM-DD or null\",\"drawings\":[{\"dwg\":\"sheet\",\"floor\":\"floor\",\"columns\":\"cols\",\"status\":\"pending\"}],\"notes\":\"notes\",\"suggestTwo\":true/false,\"reason\":\"why\"}\nEMAIL:\n"+(body||"(see PDF)")});
      const raw=await callAI(blocks,"Return only valid JSON. No markdown.");
      const data=JSON.parse(raw.replace(/```json|```/g,"").trim());
      data.receivedDate=new Date().toISOString().slice(0,10);
      data.status="pending"; data.invoiced=false; data.scheduleType="safe"; data.progressPct=0;
      data.studRailFloors=data.totalDrawings||0;
      data.billingType=data.type==="revision"?"revision":"new";
      data.invoiceAmount=(data.totalDrawings||0)*(data.type==="revision"?0:150);
      data.drafterHours=[]; data.invoiceNo=""; data.invoiceDate=""; data.paymentTerms="Net 30";
      data.driveFolder="https://drive.google.com/drive/search?q="+(data.projectId||"");
      setParsed(data); setAssIds([]); setStep("result");
      onNotif((data.type==="revision"?"REVISION":"NEW PROJECT")+": "+data.projectName+" - "+data.client);
    }catch(e){
      const blank={projectId:genId(),projectName:"",client:"",address:"",type:"new",totalDrawings:0,deadline:"",dueDate:"",drawings:[{dwg:"",floor:"",columns:"",status:"pending"}],notes:"",receivedDate:new Date().toISOString().slice(0,10),status:"pending",invoiced:false,scheduleType:"safe",progressPct:0,studRailFloors:0,billingType:"new",invoiceAmount:0,drafterHours:[],invoiceNo:"",invoiceDate:"",paymentTerms:"Net 30",driveFolder:"",suggestTwo:false,reason:""};
      setParsed(blank); setStep("result"); onToast("Could not auto-parse - fill manually","info");
    }
    setLoading(false);
  };
  const setF=(k,v)=>setParsed(p=>({...p,[k]:v}));
  const addRow=()=>setParsed(p=>({...p,drawings:[...p.drawings,{dwg:"",floor:"",columns:"",status:"pending"}]}));
  const updRow=(i,k,v)=>setParsed(p=>({...p,drawings:p.drawings.map((d,j)=>j===i?{...d,[k]:v}:d)}));
  const submit=()=>{
    if(assignIds.length===0){onToast("Select at least one drafter","error");return;}
    const pr={...parsed,id:parsed.projectId||genId(),name:parsed.projectName,assignedTo:assignIds};
    const exp=drafters.find(d=>d.id===assignIds[0])?.exp||"experienced";
    const days=estimateDays(pr.totalDrawings||1,pr.scheduleType||"safe",exp);
    pr.estimatedSubmit=addWorkDays(pr.receivedDate,days);
    pr.totalDrawings=pr.drawings.filter(d=>d.dwg).length||pr.totalDrawings;
    onCreate(pr); onClose();
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:14}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:640,maxHeight:"93vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,.4)"}}>
        <div style={{background:"linear-gradient(135deg,#0F1629,#1E2D4E)",borderRadius:"16px 16px 0 0",padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:14}}>Smart Inbox</div>
            <div style={{color:"#818CF8",fontSize:9,marginTop:1}}>Paste email from {EMAIL.fromClient} + upload PDFs to auto-create project</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#9CA3AF"}}><Ic n="close" sz={15}/></button>
        </div>
        <div style={{padding:16}}>
          {step==="paste"&&(
            <>
              <div style={{background:"#EEF2FF",borderRadius:7,padding:"6px 10px",fontSize:10,color:"#4338CA",fontWeight:600,marginBottom:11}}>Watching for emails from: {EMAIL.fromClient}</div>
              <label style={{fontSize:10,fontWeight:700,color:"#374151",display:"block",marginBottom:3}}>Paste Client Email Body</label>
              <textarea value={body} onChange={e=>setBody(e.target.value)} placeholder={"Paste email from "+EMAIL.fromClient+" here..."} rows={8} style={{width:"100%",border:"2px solid #E5E7EB",borderRadius:8,padding:"8px 10px",fontSize:11,outline:"none",resize:"vertical",fontFamily:"inherit",lineHeight:1.6,boxSizing:"border-box",marginBottom:11}}/>
              <label style={{fontSize:10,fontWeight:700,color:"#374151",display:"block",marginBottom:3}}>Upload PDFs (optional)</label>
              <div onClick={()=>ref.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();setPDFs([...pdfs,...Array.from(e.dataTransfer.files).filter(f=>f.type==="application/pdf")]);}} style={{border:"2px dashed #C7D2FE",borderRadius:8,padding:14,textAlign:"center",cursor:"pointer",background:"#F8F7FF",marginBottom:11}}>
                <div style={{fontSize:18,marginBottom:2}}>PDF</div>
                <div style={{fontSize:10,color:"#6B7280"}}>Drop PDFs or click to choose</div>
                <input ref={ref} type="file" accept=".pdf" multiple style={{display:"none"}} onChange={e=>setPDFs([...pdfs,...Array.from(e.target.files)])}/>
              </div>
              {pdfs.map((f,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",background:"#F3F4F6",borderRadius:5,padding:"3px 8px",marginBottom:4,fontSize:10}}><span>{f.name}</span><button onClick={()=>setPDFs(pdfs.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:"#EF4444",fontSize:11}}>X</button></div>)}
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>{const b={projectId:genId(),projectName:"",client:"",address:"",type:"new",totalDrawings:0,deadline:"",dueDate:"",drawings:[{dwg:"",floor:"",columns:"",status:"pending"}],notes:"",receivedDate:new Date().toISOString().slice(0,10),status:"pending",invoiced:false,scheduleType:"safe",progressPct:0,studRailFloors:0,billingType:"new",invoiceAmount:0,drafterHours:[],invoiceNo:"",invoiceDate:"",paymentTerms:"Net 30",driveFolder:"",suggestTwo:false,reason:""};setParsed(b);setStep("result");}} style={{flex:1,background:"#F3F4F6",border:"none",borderRadius:7,padding:"9px 0",cursor:"pointer",fontWeight:700,fontSize:11}}>Manual Entry</button>
                <button onClick={analyze} disabled={loading} style={{flex:2,background:"linear-gradient(135deg,#6366F1,#A855F7)",color:"#fff",border:"none",borderRadius:7,padding:"9px 0",cursor:"pointer",fontWeight:800,fontSize:11,opacity:loading?.7:1}}>
                  {loading?"Analyzing...":"Auto-Detect Project"}
                </button>
              </div>
            </>
          )}
          {step==="result"&&parsed&&(
            <>
              {parsed.suggestTwo!==undefined&&<div style={{background:parsed.suggestTwo?"#FEF3C7":"#D1FAE5",borderRadius:8,padding:"8px 11px",marginBottom:11,fontSize:10,fontWeight:600,color:parsed.suggestTwo?"#92400E":"#065F46"}}>
                AI Recommendation: {parsed.suggestTwo?"Assign 2 drafters":"1 drafter is enough"}{parsed.reason?" - "+parsed.reason:""}
              </div>}
              <div style={{marginBottom:11}}>
                <label style={{fontSize:10,fontWeight:700,color:"#374151",display:"block",marginBottom:5}}>Assign Drafter(s)</label>
                <div style={{display:"flex",gap:6}}>
                  {DRAFTERS_INIT.map(d=>{
                    const sel=assignIds.includes(d.id);
                    return <button key={d.id} onClick={()=>setAssIds(sel?assignIds.filter(x=>x!==d.id):[...assignIds,d.id])} style={{flex:1,background:sel?"linear-gradient(135deg,#6366F1,#A855F7)":"#F3F4F6",color:sel?"#fff":"#374151",border:"none",borderRadius:8,padding:"8px 4px",cursor:"pointer",fontWeight:700,fontSize:10,textAlign:"center"}}>
                      <div style={{fontSize:14,marginBottom:1}}>{d.av}</div>
                      <div>{d.name}</div>
                      {d.schedule==="limited"&&<div style={{fontSize:7,color:sel?"#C7D2FE":"#F59E0B",marginTop:1}}>Limited hrs</div>}
                    </button>;
                  })}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:9}}>
                {[["Project ID","projectId"],["Project Name","projectName"],["Client","client"],["Address","address"],["Due Date","dueDate","date"],["Deadline","deadline"],["Invoice ($)","invoiceAmount","number"],["Type","type"]].map(([l,k,t])=>(
                  <div key={k} style={{gridColumn:k==="projectName"||k==="address"?"1 / -1":"auto"}}>
                    <label style={{fontSize:9,fontWeight:700,color:"#374151",display:"block",marginBottom:2}}>{l}</label>
                    {k==="type"?<select value={parsed[k]||"new"} onChange={e=>setF(k,e.target.value)} style={{width:"100%",border:"1px solid #E5E7EB",borderRadius:5,padding:"5px 7px",fontSize:10,outline:"none"}}><option value="new">New Project</option><option value="revision">Revision</option></select>:<input type={t||"text"} value={parsed[k]||""} onChange={e=>setF(k,e.target.value)} style={{width:"100%",border:"1px solid #E5E7EB",borderRadius:5,padding:"5px 7px",fontSize:10,outline:"none",boxSizing:"border-box"}}/>}
                  </div>
                ))}
              </div>
              <label style={{fontSize:9,fontWeight:700,color:"#374151",display:"block",marginBottom:4}}>Drawings</label>
              {(parsed.drawings||[]).map((d,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr auto",gap:5,marginBottom:5,alignItems:"center"}}>
                  <input placeholder="Sheet" value={d.dwg} onChange={e=>updRow(i,"dwg",e.target.value)} style={{border:"1px solid #E5E7EB",borderRadius:5,padding:"4px 6px",fontSize:9,outline:"none"}}/>
                  <input placeholder="Floor" value={d.floor} onChange={e=>updRow(i,"floor",e.target.value)} style={{border:"1px solid #E5E7EB",borderRadius:5,padding:"4px 6px",fontSize:9,outline:"none"}}/>
                  <input placeholder="Columns" value={d.columns||""} onChange={e=>updRow(i,"columns",e.target.value)} style={{border:"1px solid #E5E7EB",borderRadius:5,padding:"4px 6px",fontSize:9,outline:"none"}}/>
                  <button onClick={()=>setParsed(p=>({...p,drawings:p.drawings.filter((_,j)=>j!==i)}))} style={{background:"#FEE2E2",border:"none",borderRadius:5,padding:"4px 6px",cursor:"pointer",color:"#DC2626",fontSize:10}}>X</button>
                </div>
              ))}
              <button onClick={addRow} style={{background:"#EEF2FF",color:"#4F46E5",border:"none",borderRadius:5,padding:"4px 9px",cursor:"pointer",fontWeight:700,fontSize:9,display:"flex",alignItems:"center",gap:2,marginBottom:9}}><Ic n="plus" sz={9}/>Add Row</button>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:9,fontWeight:700,color:"#374151",display:"block",marginBottom:2}}>Notes</label>
                <textarea value={parsed.notes||""} onChange={e=>setF("notes",e.target.value)} rows={2} style={{width:"100%",border:"1px solid #E5E7EB",borderRadius:5,padding:"5px 7px",fontSize:10,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>setStep("paste")} style={{flex:1,background:"#F3F4F6",border:"none",borderRadius:7,padding:"9px 0",cursor:"pointer",fontWeight:700,fontSize:11}}>Back</button>
                <button onClick={submit} style={{flex:2,background:"linear-gradient(135deg,#6366F1,#A855F7)",color:"#fff",border:"none",borderRadius:7,padding:"9px 0",cursor:"pointer",fontWeight:800,fontSize:11}}>Create Project</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:14}} onClick={e=>e.target===e.currentTarget&&onClose()}>

        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{navigator.clipboard?.writeText(msg);onToast("Copied!");}} style={{flex:1,background:"#F3F4F6",border:"none",borderRadius:7,padding:"9px 0",cursor:"pointer",fontWeight:700,fontSize:11}}>Copy</button>

        </div>
      </div>
    </div>
  );
}

}

// ========== PROGRESS MODAL ==========
function ProgModal({project:p,onClose,onUpdate,onNotif}) {
  const [val,setVal]=useState(p.progressPct||0);
  const [note,setNote]=useState("");
  const col=val<40?"#EF4444":val<80?"#F59E0B":"#10B981";
  const save=()=>{ onUpdate({...p,progressPct:val,status:val===100?"review":val>0?"in_progress":"pending"}); onNotif(p.id+" - "+p.name+": "+val+"%"+(note?" - "+note:"")); onClose(); };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:14}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#fff",borderRadius:14,padding:20,width:"100%",maxWidth:360,boxShadow:"0 20px 60px rgba(0,0,0,.35)"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontWeight:800,fontSize:13}}>Update Progress</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer"}}><Ic n="close" sz={14} col="#6B7280"/></button>
        </div>
        <div style={{fontSize:11,color:"#374151",marginBottom:12,fontWeight:600}}>{p.id} - {p.name}</div>
        <div style={{textAlign:"center",marginBottom:12}}>
          <div style={{fontSize:44,fontWeight:900,color:col,lineHeight:1}}>{val}%</div>
          <div style={{fontSize:10,color:"#6B7280",marginTop:2}}>{val===0?"Not started":val===100?"Ready for review":val<50?"In progress":"More than halfway!"}</div>
        </div>
        <input type="range" min={0} max={100} step={5} value={val} onChange={e=>setVal(Number(e.target.value))} style={{width:"100%",marginBottom:7,accentColor:col}}/>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          {[0,25,50,75,100].map(v=><button key={v} onClick={()=>setVal(v)} style={{background:val===v?col:"#F3F4F6",color:val===v?"#fff":"#6B7280",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontWeight:700,fontSize:9}}>{v}%</button>)}
        </div>
        <div style={{height:7,background:"#F3F4F6",borderRadius:99,overflow:"hidden",marginBottom:11}}>
          <div style={{height:"100%",width:val+"%",background:col,borderRadius:99,transition:"width .3s"}}/>
        </div>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Note (e.g. S-101 done, working on S-103)" style={{width:"100%",border:"1px solid #E5E7EB",borderRadius:6,padding:"6px 8px",fontSize:10,outline:"none",boxSizing:"border-box",marginBottom:11}}/>
        <button onClick={save} style={{width:"100%",background:col,color:"#fff",border:"none",borderRadius:8,padding:"10px 0",cursor:"pointer",fontWeight:800,fontSize:12}}>Save Progress</button>
      </div>
    </div>
  );
}

</script>
</body>
</html>
